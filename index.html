<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tempered Glass Lookup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 480px;
        margin: 30px auto;
        padding: 12px;
      }
      h2 {
        color: #228bee;
      }
      input[type="text"] {
        padding: 6px;
        width: 70%;
      }
      button {
        padding: 7px 15px;
        margin: 6px 4px;
      }
      .result {
        margin: 14px 0;
        font-size: 1.1em;
      }
      ul {
        margin-left: 0;
      }
      .main-model {
        font-weight: bold;
        color: #155a8a;
      }
      .models-list {
        margin-bottom: 16px;
      }
      hr {
        margin: 26px 0;
      }
      #suggestions {
        background: #fff;
        border: 1px solid #ccc;
        position: absolute;
        max-height: 150px;
        overflow-y: auto;
        width: 70%;
        z-index: 99;
        box-sizing: border-box;
        display: none;
      }
      .suggestion-item:hover {
        background-color: #f0f0f0;
      }
      form {
        position: relative;
      }
      .hidden {
        display: none !important;
      }
      .nav-btn {
        font-size: 1.1em;
      }
    </style>
  </head>
  <body>
    <!-- Home Menu -->
    <div id="homeMenu" style="text-align: center; margin-top: 40px">
      <button id="btnTemperedGlass" class="nav-btn">Tempered Glass</button>
      <button id="btnDSE" class="nav-btn">DSE</button>
    </div>

    <!-- Tempered Glass Compatibility Page -->
    <div id="temperedGlassPage" class="hidden">
      <button onclick="goHome()" style="margin-bottom: 16px">
        Back to Home
      </button>
      <h2>Tempered Glass Compatibility Lookup</h2>
      <form id="searchForm" autocomplete="off">
        <input
          type="text"
          id="searchInput"
          placeholder="Enter phone model..."
        />
        <div id="suggestions"></div>
        <button type="submit">Search</button>
      </form>
      <div class="result" id="result"></div>
      <hr />
      <h3>All Main Tempered Glass Models</h3>
      <div id="modelsList"></div>
    </div>

    <!-- Daily Sales Entry Page (empty for now) -->
    <div id="dsePage" class="hidden">
      <button onclick="goHome()" style="margin-bottom: 16px">
        Back to Home
      </button>
      <h2>DSE (Daily Sales Entry)</h2>
      <p>Sales entry form coming soon...</p>
    </div>

    <!-- Load data.js BEFORE your main script -->
    <script src="data.js"></script>

    <script>
      // PAGE NAVIGATION LOGIC
      function showPage(pageId) {
        document.getElementById("homeMenu").classList.add("hidden");
        document.getElementById("temperedGlassPage").classList.add("hidden");
        document.getElementById("dsePage").classList.add("hidden");
        document.getElementById(pageId).classList.remove("hidden");
      }
      function goHome() {
        document.getElementById("homeMenu").classList.remove("hidden");
        document.getElementById("temperedGlassPage").classList.add("hidden");
        document.getElementById("dsePage").classList.add("hidden");
      }
      document.getElementById("btnTemperedGlass").onclick = function () {
        showPage("temperedGlassPage");
      };
      document.getElementById("btnDSE").onclick = function () {
        showPage("dsePage");
      };

      // SEARCH AND AUTOCOMPLETE LOGIC

      function normalize(text) {
        return text.replace(/\s+/g, "").toLowerCase();
      }

      const allModels = [];
      temperedGlassData.forEach((item) => {
        item.models.forEach((m) => {
          if (m && !allModels.includes(m)) allModels.push(m);
        });
      });

      const searchInput = document.getElementById("searchInput");
      const suggestionsDiv = document.getElementById("suggestions");
      let selectedModel = null;

      searchInput &&
        searchInput.addEventListener("input", function () {
          const val = this.value;
          suggestionsDiv.innerHTML = "";
          selectedModel = null;

          document.getElementById("result").innerHTML = "";

          if (val.trim().length === 0) {
            suggestionsDiv.style.display = "none";
            return;
          }
          const matchedModels = allModels.filter((m) =>
            normalize(m).includes(normalize(val))
          );
          if (matchedModels.length === 0) {
            suggestionsDiv.style.display = "none";
            return;
          }

          suggestionsDiv.style.display = "block";
          suggestionsDiv.innerHTML = matchedModels
            .map(
              (m) =>
                `<div class="suggestion-item"
             style="padding:5px;cursor:pointer;"
             onclick="selectSuggestion('${m.replace(/'/g, "\\'")}')">${m}</div>`
            )
            .join("");
        });

      window.selectSuggestion = function (modelName) {
        searchInput.value = modelName;
        suggestionsDiv.innerHTML = "";
        suggestionsDiv.style.display = "none";
        selectedModel = modelName;
        showMainModels(modelName);
      };

      document.body.addEventListener("click", function (e) {
        if (e.target !== searchInput) {
          suggestionsDiv.innerHTML = "";
          suggestionsDiv.style.display = "none";
        }
      });

      function showMainModels(modelName) {
        const matches = temperedGlassData.filter((item) =>
          item.models.some((phone) => normalize(phone) === normalize(modelName))
        );
        const resultDiv = document.getElementById("result");
        if (matches.length === 0) {
          resultDiv.textContent = "No main model found for this phone model.";
        } else {
          resultDiv.innerHTML =
            "Main Tempered Glass Models: <ul>" +
            matches.map((item) => `<li>${item.mainModel}</li>`).join("") +
            "</ul>";
        }
      }

      document.getElementById("searchForm") &&
        (document.getElementById("searchForm").onsubmit = function (e) {
          e.preventDefault();
          let modelName = searchInput.value.trim();
          if (!modelName) return;
          showMainModels(modelName);
        });

      const modelsDiv = document.getElementById("modelsList");
      if (modelsDiv)
        modelsDiv.innerHTML = temperedGlassData
          .map(
            (item) =>
              `<div class="models-list">
        <span class="main-model">${item.mainModel}</span>
        <ul>
          ${item.models.map((m) => `<li>${m}</li>`).join("")}
        </ul>
      </div>`
          )
          .join("");

      // Initial state
      goHome();
    </script>
  </body>
</html>
